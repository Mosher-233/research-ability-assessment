server:
  port: 8080
  mode: debug
  read_timeout: 10s
  write_timeout: 10s

database:
  type: mysql
  host: localhost
  port: 3306
  user: root
  password: your_password
  dbname: research_assessment
  sslmode: disable

llm:
  provider: openai
  api_key: your_api_key_here
  base_url: https://api.openai.com/v1
  model: gpt-3.5-turbo
  max_tokens: 1000
  temperature: 0.7

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0

neo4j:
  uri: bolt://localhost:7687
  username: neo4j
  password: neo4jpassword
